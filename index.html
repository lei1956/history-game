<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>史战天下 — 历史学习游戏</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #FAFAF8;
    --surface: #FFFFFF;
    --border: #E8E6DF;
    --text: #2C2C2A;
    --muted: #888780;
    --easy: #3B6D11;
    --easy-bg: #EAF3DE;
    --mid: #185FA5;
    --mid-bg: #E6F1FB;
    --hard: #993556;
    --hard-bg: #FBEAF0;
    --gold: #BA7517;
    --gold-bg: #FAEEDA;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── SCREENS ── */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ── HOME ── */
  #home {
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    gap: 32px;
  }
  .logo-area { text-align: center; }
  .logo-title {
    font-size: 32px;
    font-weight: 500;
    letter-spacing: 4px;
    color: var(--text);
  }
  .logo-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 1px;
  }
  .logo-icon {
    font-size: 56px;
    display: block;
    margin-bottom: 12px;
  }

  .stats-row {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 360px;
  }
  .stat-card {
    flex: 1;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    text-align: center;
  }
  .stat-num { font-size: 24px; font-weight: 500; color: var(--text); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .home-btns {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 360px;
  }

  .btn-play {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: var(--radius);
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: 2px;
    font-family: inherit;
  }
  .btn-play:active { opacity: 0.75; }

  .btn-easy { background: var(--easy-bg); color: var(--easy); }
  .btn-mid  { background: var(--mid-bg);  color: var(--mid); }
  .btn-hard { background: var(--hard-bg); color: var(--hard); }

  .btn-secondary {
    width: 100%;
    padding: 12px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    color: var(--muted);
    background: transparent;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .btn-secondary:active { background: var(--border); }

  /* ── GAME SCREEN ── */
  #game {
    padding: 0;
    background: var(--bg);
  }

  .game-header {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .game-header-left { display: flex; align-items: center; gap: 10px; }
  .back-btn {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
    color: var(--muted);
  }
  .difficulty-tag {
    font-size: 12px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
  }
  .tag-easy { background: var(--easy-bg); color: var(--easy); }
  .tag-mid  { background: var(--mid-bg);  color: var(--mid); }
  .tag-hard { background: var(--hard-bg); color: var(--hard); }

  .progress-wrap {
    flex: 1;
    margin: 0 16px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: var(--mid);
    border-radius: 2px;
    transition: width 0.3s ease;
  }
  .q-count { font-size: 12px; color: var(--muted); white-space: nowrap; }

  .game-body { padding: 24px 20px 40px; flex: 1; max-width: 640px; margin: 0 auto; width: 100%; }

  .score-live {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .score-pts { font-size: 18px; font-weight: 500; color: var(--gold); }

  .question-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 20px;
    margin-bottom: 20px;
  }
  .q-num { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .q-text { font-size: 16px; line-height: 1.7; font-weight: 500; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn {
    width: 100%;
    padding: 14px 16px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    font-size: 14px;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
    line-height: 1.5;
    transition: background 0.12s, border-color 0.12s;
    color: var(--text);
  }
  .opt-btn:active { opacity: 0.8; }
  .opt-btn.correct {
    background: var(--easy-bg);
    border-color: var(--easy);
    color: var(--easy);
  }
  .opt-btn.wrong {
    background: #FCEBEB;
    border-color: #A32D2D;
    color: #A32D2D;
  }
  .opt-btn.reveal {
    background: var(--easy-bg);
    border-color: var(--easy);
    color: var(--easy);
    opacity: 0.7;
  }
  .opt-btn:disabled { cursor: default; }
  .opt-label { font-weight: 500; margin-right: 8px; }

  .feedback-box {
    background: var(--gold-bg);
    border: 0.5px solid var(--gold);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-size: 13px;
    color: #633806;
    margin-top: 16px;
    line-height: 1.7;
    display: none;
  }
  .feedback-box.show { display: block; }
  .feedback-title { font-weight: 500; margin-bottom: 4px; }

  .next-btn {
    width: 100%;
    padding: 14px;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    margin-top: 16px;
    display: none;
    letter-spacing: 1px;
    transition: opacity 0.15s;
  }
  .next-btn:active { opacity: 0.75; }
  .next-btn.show { display: block; }

  /* ── RESULT SCREEN ── */
  #result {
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    gap: 24px;
  }
  .result-icon { font-size: 64px; text-align: center; }
  .result-title { font-size: 24px; font-weight: 500; text-align: center; }
  .result-sub { font-size: 14px; color: var(--muted); text-align: center; }

  .result-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    max-width: 360px;
  }
  .result-stat {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px;
    text-align: center;
  }
  .result-stat .num { font-size: 28px; font-weight: 500; }
  .result-stat .lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .achievements-earned {
    width: 100%;
    max-width: 360px;
  }
  .ach-title { font-size: 13px; color: var(--muted); margin-bottom: 10px; font-weight: 500; }
  .ach-list { display: flex; flex-direction: column; gap: 8px; }
  .ach-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--gold-bg);
    border: 0.5px solid var(--gold);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
  }
  .ach-icon { font-size: 24px; }
  .ach-name { font-size: 13px; font-weight: 500; color: #633806; }
  .ach-desc { font-size: 11px; color: var(--gold); margin-top: 1px; }

  .result-btns {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 360px;
  }
  .btn-primary {
    width: 100%;
    padding: 14px;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 1px;
  }

  /* ── ACHIEVEMENTS SCREEN ── */
  #achievements {
    padding: 0;
    flex-direction: column;
  }
  .page-header {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
  }
  .page-title { font-size: 16px; font-weight: 500; }

  .ach-page-body { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .ach-card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .ach-card.locked { opacity: 0.4; }
  .ach-card-icon { font-size: 32px; width: 48px; text-align: center; flex-shrink: 0; }
  .ach-card-info { flex: 1; }
  .ach-card-name { font-size: 14px; font-weight: 500; }
  .ach-card-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .ach-card-pts { font-size: 12px; color: var(--gold); font-weight: 500; margin-top: 4px; }

  /* ── ANIMATIONS ── */
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .animate-in { animation: slideUp 0.25s ease; }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  .pop { animation: pop 0.2s ease; }

</style>
</head>
<body>

<!-- ══ HOME SCREEN ══ -->
<div id="home" class="screen active">
  <div class="logo-area">
    <span class="logo-icon">⚔️</span>
    <div class="logo-title">史战天下</div>
    <div class="logo-sub">高中历史 · 闯关挑战</div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="total-score">0</div>
      <div class="stat-label">总积分</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="total-played">0</div>
      <div class="stat-label">已答题数</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="ach-count">0</div>
      <div class="stat-label">成就数</div>
    </div>
  </div>

  <div class="home-btns">
    <button class="btn-play btn-easy" onclick="startGame('easy')">⬤ 简单模式</button>
    <button class="btn-play btn-mid"  onclick="startGame('mid')">⬤ 中等模式</button>
    <button class="btn-play btn-hard" onclick="startGame('hard')">⬤ 困难模式</button>
    <button class="btn-secondary" onclick="showScreen('achievements')">查看成就</button>
  </div>

  <div style="font-size:12px;color:var(--muted);text-align:center;">
    简单 · 典故常识 &nbsp;|&nbsp; 中等 · 人物事件 &nbsp;|&nbsp; 困难 · 深度分析
  </div>
</div>

<!-- ══ GAME SCREEN ══ -->
<div id="game" class="screen">
  <div class="game-header">
    <div class="game-header-left">
      <button class="back-btn" onclick="confirmBack()">←</button>
      <span class="difficulty-tag" id="diff-tag">简单</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <span class="q-count" id="q-count">1/10</span>
  </div>

  <div class="game-body">
    <div class="score-live">
      <span>本局得分</span>
      <span class="score-pts" id="live-score">0 分</span>
    </div>

    <div class="question-card animate-in" id="question-card">
      <div class="q-num" id="q-num">第 1 题</div>
      <div class="q-text" id="q-text">题目加载中…</div>
    </div>

    <div class="options" id="options"></div>

    <div class="feedback-box" id="feedback-box">
      <div class="feedback-title" id="feedback-title"></div>
      <div id="feedback-body"></div>
    </div>

    <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一题 →</button>
  </div>
</div>

<!-- ══ RESULT SCREEN ══ -->
<div id="result" class="screen">
  <div class="result-icon" id="result-icon">🏆</div>
  <div class="result-title" id="result-title">挑战完成！</div>
  <div class="result-sub" id="result-sub">你答对了 8 道题</div>

  <div class="result-stats">
    <div class="result-stat">
      <div class="num" id="res-correct" style="color:var(--easy)">0</div>
      <div class="lbl">答对</div>
    </div>
    <div class="result-stat">
      <div class="num" id="res-wrong" style="color:#A32D2D">0</div>
      <div class="lbl">答错</div>
    </div>
    <div class="result-stat">
      <div class="num" id="res-pts" style="color:var(--gold)">0</div>
      <div class="lbl">本局积分</div>
    </div>
    <div class="result-stat">
      <div class="num" id="res-acc">0%</div>
      <div class="lbl">正确率</div>
    </div>
  </div>

  <div class="achievements-earned" id="new-achievements" style="display:none">
    <div class="ach-title">🏅 新获得成就</div>
    <div class="ach-list" id="new-ach-list"></div>
  </div>

  <div class="result-btns">
    <button class="btn-primary" id="replay-btn" onclick="replayGame()">再战一局</button>
    <button class="btn-secondary" onclick="showScreen('home')">返回首页</button>
  </div>
</div>

<!-- ══ ACHIEVEMENTS SCREEN ══ -->
<div id="achievements" class="screen">
  <div class="page-header">
    <button class="back-btn" onclick="showScreen('home')" style="font-size:18px;color:var(--muted);background:none;border:none;cursor:pointer;">←</button>
    <span class="page-title">成就殿堂</span>
  </div>
  <div class="ach-page-body" id="ach-page-body"></div>
</div>

<script>
/* ═══════════════════════════════════════════
   题库
═══════════════════════════════════════════ */
const QUESTIONS = {
  easy: [
    {
      q: ""破釜沉舟"这个成语来自哪场战役？",
      opts: ["长平之战", "巨鹿之战", "赤壁之战", "官渡之战"],
      ans: 1,
      tip: "公元前207年，项羽率军渡漳水后，命令士兵击破锅釜，凿沉船只，以示背水一战的决心，最终以少胜多大败秦军。"
    },
    {
      q: "秦始皇统一六国后，推行的统一货币是哪种？",
      opts: ["刀币", "布币", "圆形方孔钱", "蚁鼻钱"],
      ans: 2,
      tip: "秦统一后将货币统一为圆形方孔铜钱（秦半两），方孔象征地，圆形象征天，此后这一形制延续了约两千年。"
    },
    {
      q: "\"纸上谈兵\"这个成语讲的是哪位历史人物？",
      opts: ["廉颇", "赵括", "白起", "蒙恬"],
      ans: 1,
      tip: "赵括熟读兵书却缺乏实战经验，长平之战中代替廉颇出战，被白起击败，赵军四十万将士被坑杀。"
    },
    {
      q: "汉武帝派张骞出使西域的主要目的是什么？",
      opts: ["开拓贸易路线", "联合大月氏夹击匈奴", "传播汉族文化", "寻访长生不老药"],
      ans: 1,
      tip: "汉武帝派张骞出使西域（公元前138年），目的是联合大月氏共同对付匈奴。虽然军事目的未完全实现，但开辟了著名的丝绸之路。"
    },
    {
      q: "\"三顾茅庐\"中，刘备三次拜访的是哪位谋士？",
      opts: ["庞统", "司马懿", "诸葛亮", "荀彧"],
      ans: 2,
      tip: "公元207年前后，刘备三次前往隆中（今湖北襄阳）拜访诸葛亮，终于得到他的辅佐。诸葛亮提出了著名的《隆中对》战略。"
    },
    {
      q: "\"贞观之治\"是哪位皇帝在位时期的盛世？",
      opts: ["唐太宗", "唐高宗", "武则天", "唐玄宗"],
      ans: 0,
      tip: "贞观之治（627—649年）是唐太宗李世民统治时期，以轻徭薄赋、广开言路、任用贤才著称，是中国古代著名的治世之一。"
    },
    {
      q: "中国历史上唯一的女皇帝是谁？",
      opts: ["吕雉", "武则天", "慈禧太后", "上官婉儿"],
      ans: 1,
      tip: "武则天（624—705年），690年称帝，建立武周，是中国历史上正式登基称帝的唯一女性皇帝，在位期间重视科举，选拔人才。"
    },
    {
      q: "\"四大发明\"不包括以下哪项？",
      opts: ["造纸术", "印刷术", "天文望远镜", "火药"],
      ans: 2,
      tip: "中国古代四大发明是造纸术、印刷术、火药、指南针，天文望远镜是17世纪伽利略等欧洲科学家发明并改进的。"
    },
    {
      q: "\"烽火戏诸侯\"的故事与哪位周朝天子有关？",
      opts: ["周武王", "周厉王", "周幽王", "周平王"],
      ans: 2,
      tip: "周幽王为博褒姒一笑，多次点燃烽火欺骗诸侯。后犬戎真正入侵时，诸侯不再来援，西周就此灭亡（公元前771年）。"
    },
    {
      q: "以下哪个朝代最先建立科举制度？",
      opts: ["汉朝", "魏晋", "隋朝", "唐朝"],
      ans: 2,
      tip: "科举制度由隋文帝杨坚于公元587年创立，隋炀帝时设进士科加以完善，此后历经唐宋元明清各朝，延续约1300年。"
    }
  ],
  mid: [
    {
      q: "商鞅变法的核心内容是什么？",
      opts: ["废除贵族世袭特权，按军功授爵", "推行井田制，均分土地", "废除死刑，施行仁政", "推广儒学，以礼治国"],
      ans: 0,
      tip: "商鞅变法（公元前356年起）废除了贵族世袭制度，规定按军功赐予爵位和土地，大大激发了秦国士兵的战斗意志，为统一六国奠定了基础。"
    },
    {
      q: "以下哪场战役标志着三国鼎立局面开始形成？",
      opts: ["长平之战", "赤壁之战", "官渡之战", "夷陵之战"],
      ans: 1,
      tip: "公元208年的赤壁之战，孙刘联军以少胜多大败曹操，阻止了曹操统一天下的步伐，此后形成魏、蜀、吴三分天下的格局。"
    },
    {
      q: "唐朝安史之乱的起因是什么？",
      opts: ["宦官专权，皇帝昏庸", "节度使势力过大，安禄山与史思明叛乱", "外戚干政，朝政腐败", "农民起义，官逼民反"],
      ans: 1,
      tip: "755年，身兼三镇节度使的安禄山与史思明以\"清君侧\"为名起兵叛乱，史称安史之乱（755—763年），是唐朝由盛转衰的转折点。"
    },
    {
      q: "王安石变法的主要目的是什么？",

/* ═══════════════════════════════════════════
   状态存储
═══════════════════════════════════════════ */
function loadState() {
  try {
    return JSON.parse(localStorage.getItem("historyGame") || "{}");
  } catch { return {}; }
}
function saveState(s) {
  localStorage.setItem("historyGame", JSON.stringify(s));
}

let state = {
  totalScore: 0,
  totalAnswered: 0,
  totalGames: 0,
  unlockedAch: [],
  ...loadState()
};

/* ═══════════════════════════════════════════
   游戏变量
═══════════════════════════════════════════ */
let currentDiff = "easy";
let questions = [];
let currentIdx = 0;
let score = 0;
let correct = 0;
let answered = 0;
let streak = 0;
let maxStreak = 0;
let answered_this = false;

/* ═══════════════════════════════════════════
   工具函数
═══════════════════════════════════════════ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if (id === "home") updateHomeStats();
  if (id === "achievements") renderAchievements();
}

function updateHomeStats() {
  document.getElementById("total-score").textContent = state.totalScore;
  document.getElementById("total-played").textContent = state.totalAnswered;
  document.getElementById("ach-count").textContent = state.unlockedAch.length;
}

/* ═══════════════════════════════════════════
   开始游戏
═══════════════════════════════════════════ */
function startGame(diff) {
  currentDiff = diff;
  questions = shuffle(QUESTIONS[diff]).slice(0, 10);
  currentIdx = 0;
  score = 0;
  correct = 0;
  answered = 0;
  streak = 0;
  maxStreak = 0;

  const tagEl = document.getElementById("diff-tag");
  tagEl.textContent = { easy: "简单", mid: "中等", hard: "困难" }[diff];
  tagEl.className = "difficulty-tag tag-" + diff;

  const bar = document.getElementById("progress-bar");
  bar.style.background = diff === "easy" ? "var(--easy)" : diff === "mid" ? "var(--mid)" : "var(--hard)";

  showScreen("game");
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentIdx];
  const total = questions.length;
  answered_this = false;

  document.getElementById("q-num").textContent = "第 " + (currentIdx + 1) + " 题";
  document.getElementById("q-text").textContent = q.q;
  document.getElementById("q-count").textContent = (currentIdx + 1) + "/" + total;
  document.getElementById("progress-bar").style.width = (currentIdx / total * 100) + "%";
  document.getElementById("live-score").textContent = score + " 分";
  document.getElementById("feedback-box").classList.remove("show");
  document.getElementById("next-btn").classList.remove("show");

  const opts = document.getElementById("options");
  opts.innerHTML = "";
  const labels = ["A", "B", "C", "D"];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "opt-btn";
    btn.innerHTML = `<span class="opt-label">${labels[i]}.</span>${opt}`;
    btn.onclick = () => selectAnswer(i, q.ans, q.tip);
    opts.appendChild(btn);
  });

  const card = document.getElementById("question-card");
  card.classList.remove("animate-in");
  void card.offsetWidth;
  card.classList.add("animate-in");
}

function selectAnswer(chosen, correct_idx, tip) {
  if (answered_this) return;
  answered_this = true;

  const btns = document.querySelectorAll(".opt-btn");
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === correct_idx) b.classList.add(chosen === correct_idx ? "correct" : "reveal");
  });
  if (chosen !== correct_idx) btns[chosen].classList.add("wrong");

  const isCorrect = chosen === correct_idx;
  answered++;

  if (isCorrect) {
    correct++;
    streak++;
    if (streak > maxStreak) maxStreak = streak;
    const pts = calcPoints();
    score += pts;

    document.getElementById("feedback-title").textContent = "✓ 回答正确！+" + pts + " 分";
    document.getElementById("feedback-body").textContent = tip;
  } else {
    streak = 0;
    document.getElementById("feedback-title").textContent = "✗ 回答错误";
    document.getElementById("feedback-body").textContent = tip;
  }

  const fb = document.getElementById("feedback-box");
  fb.classList.add("show");
  document.getElementById("next-btn").classList.add("show");
  document.getElementById("next-btn").textContent =
    currentIdx + 1 >= questions.length ? "查看结果 →" : "下一题 →";

  document.getElementById("live-score").textContent = score + " 分";
  document.getElementById("live-score").classList.add("pop");
  setTimeout(() => document.getElementById("live-score").classList.remove("pop"), 200);
}

function calcPoints() {
  const base = { easy: 10, mid: 20, hard: 35 }[currentDiff];
  const bonus = streak >= 3 ? Math.floor(base * 0.5) : 0;
  return base + bonus;
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= questions.length) {
    endGame();
  } else {
    renderQuestion();
  }
}

function endGame() {
  const total = questions.length;
  const acc = Math.round(correct / total * 100);

  state.totalAnswered += answered;
  state.totalScore += score;
  state.totalGames++;
  state.lastCorrect = correct;
  state.lastTotal = total;
  state.lastDiff = currentDiff;
  state.maxStreak = maxStreak;

  const newAch = checkAchievements();
  saveState(state);

  document.getElementById("result-icon").textContent =
    acc >= 90 ? "🏆" : acc >= 70 ? "🎉" : acc >= 50 ? "📖" : "💪";
  document.getElementById("result-title").textContent =
    acc >= 90 ? "历史大家！" : acc >= 70 ? "挑战完成！" : acc >= 50 ? "继续加油！" : "再接再厉！";
  document.getElementById("result-sub").textContent =
    `本局答对 ${correct}/${total} 题，正确率 ${acc}%`;

  document.getElementById("res-correct").textContent = correct;
  document.getElementById("res-wrong").textContent = total - correct;
  document.getElementById("res-pts").textContent = score;
  document.getElementById("res-acc").textContent = acc + "%";

  document.getElementById("replay-btn").textContent =
    "再战一局（" + { easy: "简单", mid: "中等", hard: "困难" }[currentDiff] + "）";

  const newAchWrap = document.getElementById("new-achievements");
  if (newAch.length > 0) {
    newAchWrap.style.display = "block";
    const list = document.getElementById("new-ach-list");
    list.innerHTML = "";
    newAch.forEach(a => {
      list.innerHTML += `
        <div class="ach-item">
          <span class="ach-icon">${a.icon}</span>
          <div>
            <div class="ach-name">${a.name}</div>
            <div class="ach-desc">${a.desc} · +${a.pts}分</div>
          </div>
        </div>`;
    });
  } else {
    newAchWrap.style.display = "none";
  }

  showScreen("result");
}

function checkAchievements() {
  const newly = [];
  ALL_ACHIEVEMENTS.forEach(a => {
    if (!state.unlockedAch.includes(a.id) && a.check(state)) {
      state.unlockedAch.push(a.id);
      state.totalScore += a.pts;
      newly.push(a);
    }
  });
  return newly;
}

function replayGame() {
  startGame(currentDiff);
}

function confirmBack() {
  if (confirm("确定要退出本局游戏吗？当前进度将不会保存。")) {
    showScreen("home");
  }
}

          <div class="ach-card-pts">+${a.pts} 积分奖励</div>
        </div>
      </div>`;
  });
}

/* ── 初始化 ── */
updateHomeStats();
</script>
