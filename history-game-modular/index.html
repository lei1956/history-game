<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>史战天下 — 历史学习游戏</title>
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 加载遮罩 -->
<div class="loading-wrap" id="loading-wrap">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loading-text">正在加载资源…</div>
</div>

<!-- 设置面板 -->
<div class="settings-overlay" id="settings-overlay" onclick="if(event.target===this)closeSettings()">
  <div class="settings-panel">
    <div class="settings-header">
      <div class="settings-title">⚙️ 设置</div>
      <button class="settings-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="settings-row">
      <div class="settings-label">背景音乐<br><small>开启/关闭</small></div>
      <div class="toggle" id="set-bgm-toggle"></div>
    </div>
    <div class="settings-row">
      <div class="settings-label">音乐音量</div>
      <input type="range" id="set-bgm-vol" min="0" max="1" step="0.05">
    </div>
    <div class="settings-row">
      <div class="settings-label">选择曲目</div>
      <select class="settings-select" id="set-bgm-select"></select>
    </div>
    <div class="settings-row">
      <div class="settings-label">音效<br><small>答对/答错提示音</small></div>
      <div class="toggle" id="set-sfx-toggle"></div>
    </div>
    <div class="settings-row">
      <div class="settings-label">音效音量</div>
      <input type="range" id="set-sfx-vol" min="0" max="1" step="0.05">
    </div>
  </div>
</div>

<!-- 首页 -->
<div id="home" class="screen active">
  <button class="settings-btn" onclick="openSettings()">⚙️</button>

  <div class="logo-area">
    <div class="logo-title">史战天下</div>
    <div class="logo-sub">高中历史 · 闯关挑战</div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="total-score">0</div>
      <div class="stat-label">总积分</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="total-played">0</div>
      <div class="stat-label">已答题数</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="ach-count">0</div>
      <div class="stat-label">成就数</div>
    </div>
  </div>

  <div class="home-btns">
    <button class="btn-play btn-easy" onclick="startGame('easy')">⬤ 简单模式</button>
    <button class="btn-play btn-mid"  onclick="startGame('mid')">⬤ 中等模式</button>
    <button class="btn-play btn-hard" onclick="startGame('hard')">⬤ 困难模式</button>
    <button class="btn-play btn-person" onclick="startGame('person')">🎯 人物风云</button>
    <button class="btn-secondary" onclick="showScreen('achievements')">查看成就</button>
  </div>

  <div style="font-size:12px;color:var(--muted);text-align:center;">
    简单 · 典故常识 | 中等 · 人物事件 | 困难 · 深度分析 | 人物 · 线索猜谜
  </div>
</div>

<!-- 游戏页 -->
<div id="game" class="screen">
  <div class="game-header">
    <div class="game-header-left">
      <button class="back-btn" onclick="confirmBack()">←</button>
      <span class="difficulty-tag" id="diff-tag">简单</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <span class="q-count" id="q-count">1/10</span>
  </div>

  <div class="game-body">
    <div class="score-live">
      <span>本局得分</span>
      <span class="score-pts" id="live-score">0 分</span>
    </div>

    <div class="question-card animate-in" id="question-card">
      <div class="q-num" id="q-num">第 1 题</div>
      <div class="q-text" id="q-text">题目加载中…</div>
      <div class="clue-list" id="clue-list"></div>
    </div>

    <div class="options" id="options"></div>

    <div class="answer-input-wrap" id="answer-input-wrap" style="display:none">
      <input type="text" class="answer-input" id="answer-input" placeholder="输入人物姓名…" />
      <button class="submit-btn" id="submit-btn" onclick="submitPersonAnswer()">提交</button>
    </div>

    <div class="feedback-box" id="feedback-box">
      <div class="feedback-title" id="feedback-title"></div>
      <div id="feedback-body"></div>
    </div>

    <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一题 →</button>
  </div>
</div>

<!-- 结果页 -->
<div id="result" class="screen">
  <div class="result-icon" id="result-icon">🏆</div>
  <div class="result-title" id="result-title">挑战完成！</div>
  <div class="result-sub" id="result-sub">你答对了 8 道题</div>

  <div class="result-stats">
    <div class="result-stat">
      <div class="num" id="res-correct" style="color:var(--easy)">0</div>
      <div class="lbl">答对</div>
    </div>
    <div class="result-stat">
      <div class="num" id="res-wrong" style="color:#A32D2D">0</div>
      <div class="lbl">答错</div>
    </div>
    <div class="result-stat">
      <div class="num" id="res-pts" style="color:var(--gold)">0</div>
      <div class="lbl">本局积分</div>
    </div>
    <div class="result-stat">
      <div class="num" id="res-acc">0%</div>
      <div class="lbl">正确率</div>
    </div>
  </div>

  <div class="achievements-earned" id="new-achievements" style="display:none">
    <div class="ach-title">🏅 新获得成就</div>
    <div class="ach-list" id="new-ach-list"></div>
  </div>

  <div class="result-btns">
    <button class="btn-primary" id="replay-btn" onclick="replayGame()">再战一局</button>
    <button class="btn-secondary" onclick="showScreen('home')">返回首页</button>
  </div>
</div>

<!-- 成就页 -->
<div id="achievements" class="screen">
  <div class="page-header">
    <button class="back-btn" onclick="showScreen('home')" style="font-size:18px;color:var(--muted);background:none;border:none;cursor:pointer;">←</button>
    <span class="page-title">成就殿堂</span>
  </div>
  <div class="ach-page-body" id="ach-page-body"></div>
</div>

<script src="js/game.js"></script>
</body>
</html>
